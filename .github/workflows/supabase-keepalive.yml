name: Supabase Keepalive

on:
  schedule:
    # Joka päivä klo 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Update keepalive row in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "SUPABASE_ANON_KEY length: ${#SUPABASE_ANON_KEY}"

          ENDPOINT="${SUPABASE_URL}/rest/v1/keepalive?id=eq.1"

          echo "Pinging: $ENDPOINT"

          curl -sS -X PATCH "$ENDPOINT" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            --data '{"updated_at":"'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"}' \
            --fail \
            | head -c 500

          echo
          echo "OK"
